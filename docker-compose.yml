version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      # The following should be passed in at runtime or in a .env file
      # - PORT=4000
      # - SUPABASE_URL=...
      # - SUPABASE_KEY=...
      # - MEILISEARCH_URL=...
      # - MEILISEARCH_KEY=...
      # - GITHUB_CLIENT_ID=...
      # - GITHUB_CLIENT_SECRET=...
      # - FRONTEND_URL=http://localhost:3000
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # - NEXT_PUBLIC_SUPABASE_URL=...
      # - NEXT_PUBLIC_SUPABASE_ANON_KEY=...
      # - NEXT_PUBLIC_MEILISEARCH_URL=...
      # - NEXT_PUBLIC_MEILISEARCH_SEARCH_KEY=...
      # - NEXT_PUBLIC_BACKEND_URL=http://localhost:4000
    restart: always
    depends_on:
      - backend
